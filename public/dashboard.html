<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talynk Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Talynk Dashboard</div>
        <div class="nav-user">
            <span id="username-display"></span>
            <button id="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- User Section -->
        <div id="user-section">
            <h2>Upload New Video/Image</h2>
            <form id="upload-form" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="post-title">Title</label>
                    <input type="text" id="post-title" name="title" required>
                </div>
                
                <div class="form-group">
                    <label for="category-select">Category</label>
                    <select id="category-select" name="categoryId" required>
                        <option value="">Select a category</option>
                        <!-- Categories will be loaded dynamically -->
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="media-file">Upload Media (Image/Video)</label>
                    <input type="file" id="media-file" name="media" accept="image/*,video/*" required>
                </div>
                
                <button type="submit">Upload</button>
            </form>

            <h2>My Uploads</h2>
            <div id="uploads-container" class="uploads-grid">
                <!-- Uploads will be loaded here -->
            </div>
        </div>

        <!-- Admin Section -->
        <div id="admin-section" style="display: none;">
            <h2>Pending Approvals</h2>
            <div id="pending-uploads" class="media-grid">
                <!-- Pending uploads will be displayed here -->
            </div>
        </div>
    </div>

    <script src="/js/dashboard.js"></script>
</body>
</html>
