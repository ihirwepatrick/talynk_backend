<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talynk API Test</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <h1>Talynk API Test</h1>

    <h2>Register User</h2>
    <form id="registerForm">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-group">
            <label for="primaryPhone">Primary Phone:</label>
            <input type="tel" id="primaryPhone" name="primaryPhone" required>
        </div>

        <div class="form-group">
            <label for="secondaryPhone">Secondary Phone:</label>
            <input type="tel" id="secondaryPhone" name="secondaryPhone">
        </div>

        <div class="form-group">
            <label for="faceImage">Face Image:</label>
            <input type="file" id="faceImage" name="faceImage" accept="image/*" required>
            <div id="imagePreview"></div>
        </div>

        <button type="submit">Register</button>
    </form>

    <h3>Response:</h3>
    <pre id="response"></pre>

    <script src="/js/test.js"></script>
</body>
</html>
