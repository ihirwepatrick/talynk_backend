<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/admin-dashboard.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">👨‍💼 Admin Dashboard</div>
        <div class="nav-links">
            <span id="admin-name"></span>
            <button id="logout-btn">🚪 Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Stats Cards -->
        <div class="stats-container">
            <div class="stat-card">
                <h3>📊 Total Posts</h3>
                <p id="total-count">0</p>
            </div>
            <div class="stat-card">
                <h3>⌛ Pending</h3>
                <p id="pending-count">0</p>
            </div>
            <div class="stat-card">
                <h3>✅ Approved</h3>
                <p id="approved-count">0</p>
            </div>
            <div class="stat-card">
                <h3>❌ Rejected</h3>
                <p id="rejected-count">0</p>
            </div>
        </div>

        <!-- Posts Section -->
        <div class="posts-section">
            <div class="posts-header">
                <h2>Posts Management</h2>
                <div class="filters">
                    <button class="filter-btn active" data-status="pending">⌛ Pending</button>
                    <button class="filter-btn" data-status="approved">✅ Approved</button>
                    <button class="filter-btn" data-status="rejected">❌ Rejected</button>
                </div>
            </div>

            <!-- Posts Container -->
            <div id="posts-container" class="posts-grid">
                <!-- Posts will be dynamically added here -->
            </div>
        </div>
    </div>

    <!-- Rejection Modal -->
    <div id="rejection-modal" class="modal">
        <div class="modal-content">
            <h2>Reject Post</h2>
            <textarea id="rejection-reason" placeholder="Enter reason for rejection..."></textarea>
            <div class="modal-buttons">
                <button id="confirm-reject">Confirm</button>
                <button id="cancel-reject">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/js/admin-dashboard.js"></script>
</body>
</html>
