<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline';">
    <title>Talynk Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/admin-dashboard.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-shield-alt"></i>
            Talynk Admin
        </div>
        <div class="nav-user">
            <span id="username-display"></span>
            <button id="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <div class="container">
        <!-- Statistics Cards -->
        <div class="stats-container">
            <div class="stat-card">
                <i class="fas fa-list"></i>
                <h3>Total Posts</h3>
                <span id="total-count">0</span>
            </div>
            <div class="stat-card pending">
                <i class="fas fa-clock"></i>
                <h3>Pending</h3>
                <span id="pending-count">0</span>
            </div>
            <div class="stat-card approved">
                <i class="fas fa-check"></i>
                <h3>Approved</h3>
                <span id="approved-count">0</span>
            </div>
            <div class="stat-card rejected">
                <i class="fas fa-times"></i>
                <h3>Rejected</h3>
                <span id="rejected-count">0</span>
            </div>
        </div>

        <!-- Date Filter -->
        <div class="filter-section">
            <div class="date-filter">
                <input type="date" id="start-date" placeholder="Start Date">
                <input type="date" id="end-date" placeholder="End Date">
                <button id="apply-filter">Apply Filter</button>
                <button id="reset-filter">Reset</button>
            </div>
        </div>

        <!-- Posts Tabs -->
        <div class="posts-tabs">
            <button class="tab-btn active" data-tab="pending">
                <i class="fas fa-clock"></i> Pending Review
            </button>
            <button class="tab-btn" data-tab="approved">
                <i class="fas fa-check"></i> Approved
            </button>
            <button class="tab-btn" data-tab="rejected">
                <i class="fas fa-times"></i> Rejected
            </button>
        </div>

        <!-- Posts Container -->
        <div class="posts-container">
            <div id="pending-posts" class="posts-grid active"></div>
            <div id="approved-posts" class="posts-grid"></div>
            <div id="rejected-posts" class="posts-grid"></div>
        </div>
    </div>

    <!-- Rejection Modal -->
    <div id="rejection-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Reject Post</h2>
            <form id="rejection-form">
                <input type="hidden" id="reject-post-id">
                <div class="form-group">
                    <label for="rejection-reason">Reason for Rejection (Required):</label>
                    <textarea id="rejection-reason" required minlength="10" 
                        placeholder="Please provide a detailed reason for rejection (minimum 10 characters)"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="cancel-btn" onclick="closeRejectionModal()">Cancel</button>
                    <button type="submit" class="reject-confirm-btn">Submit Rejection</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/admin-dashboard.js"></script>
</body>
</html>
