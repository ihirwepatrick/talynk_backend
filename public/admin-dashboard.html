<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/admin-dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Stats Section -->
        <div class="stats-section">
            <div class="stat-card">
                <h3>📊 Total Posts</h3>
                <span id="total-count">0</span>
            </div>
            <div class="stat-card">
                <h3>⌛ Pending</h3>
                <span id="pending-count">0</span>
            </div>
            <div class="stat-card">
                <h3>✅ Approved</h3>
                <span id="approved-count">0</span>
            </div>
            <div class="stat-card">
                <h3>❌ Rejected</h3>
                <span id="rejected-count">0</span>
            </div>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-section">
            <button class="filter-btn active" data-status="pending">⌛ Pending</button>
            <button class="filter-btn" data-status="approved">✅ Approved</button>
            <button class="filter-btn" data-status="rejected">❌ Rejected</button>
        </div>

        <!-- Posts Container -->
        <div id="posts-container" class="posts-grid">
            <!-- Posts will be dynamically added here -->
        </div>
    </div>

    <!-- Rejection Modal -->
    <div id="rejection-modal" class="modal">
        <div class="modal-content">
            <h2>Reject Post</h2>
            <textarea id="rejection-reason" placeholder="Enter reason for rejection..."></textarea>
            <div class="modal-buttons">
                <button id="confirm-reject">Confirm</button>
                <button id="cancel-reject">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/js/admin-dashboard.js"></script>
</body>
</html>
