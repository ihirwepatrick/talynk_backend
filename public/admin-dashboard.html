<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <h2>Admin Panel</h2>
            <ul>
                <li><a href="#" data-section="posts">Posts Management</a></li>
                <li><a href="#" data-section="users">User Management</a></li>
                <li><a href="#" data-section="approvers">Approvers</a></li>
                <li><a href="#" data-section="ads">Ads Management</a></li>
            </ul>
            <button id="logout-btn">Logout</button>
        </nav>

        <main class="content">
            <!-- Posts Section -->
            <section id="posts-section" class="dashboard-section">
                <h3>Posts Management</h3>
                <div class="filters">
                    <select id="post-status-filter">
                        <option value="all">All Posts</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                    <input type="text" id="post-search" placeholder="Search posts...">
                </div>
                <div id="posts-table-container"></div>
            </section>

            <!-- Users Section -->
            <section id="users-section" class="dashboard-section hidden">
                <h3>User Management</h3>
                <div class="filters">
                    <select id="user-status-filter">
                        <option value="all">All Users</option>
                        <option value="active">Active</option>
                        <option value="frozen">Frozen</option>
                    </select>
                    <input type="text" id="user-search" placeholder="Search users...">
                </div>
                <div id="users-table-container"></div>
            </section>

            <!-- Approvers Section -->
            <section id="approvers-section" class="dashboard-section hidden">
                <h3>Approvers Management</h3>
                <button id="add-approver-btn">Add New Approver</button>
                <div id="approvers-table-container"></div>
            </section>

            <!-- Ads Section -->
            <section id="ads-section" class="dashboard-section hidden">
                <h3>Ads Management</h3>
                <button id="add-ad-btn">Add New Ad</button>
                <div id="ads-table-container"></div>
            </section>
        </main>
    </div>

    <!-- Add Approver Modal -->
    <div id="add-approver-modal" class="modal">
        <div class="modal-content">
            <h3>Add New Approver</h3>
            <form id="add-approver-form">
                <div class="form-group">
                    <label for="approver-username">Username</label>
                    <input type="text" id="approver-username" required>
                </div>
                <div class="form-group">
                    <label for="approver-email">Email</label>
                    <input type="email" id="approver-email" required>
                </div>
                <div class="form-group">
                    <label for="approver-password">Password</label>
                    <input type="password" id="approver-password" required>
                </div>
                <button type="submit">Add Approver</button>
                <button type="button" class="close-modal">Cancel</button>
            </form>
        </div>
    </div>

    <script src="/js/admin-dashboard.js"></script>
</body>
</html>
