<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/admin-dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Stats Section -->
        <div class="stats-section">
            <div class="stat-card">
                <h3>📊 Total Posts</h3>
                <span id="total-count">0</span>
            </div>
            <div class="stat-card">
                <h3>⌛ Pending</h3>
                <span id="pending-count">0</span>
            </div>
            <div class="stat-card">
                <h3>✅ Approved</h3>
                <span id="approved-count">0</span>
            </div>
            <div class="stat-card">
                <h3>❌ Rejected</h3>
                <span id="rejected-count">0</span>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="posts">📝 Posts</button>
            <button class="tab-btn" data-tab="users">👥 Users</button>
        </div>

        <!-- Posts Table Section -->
        <div id="posts-tab" class="tab-content active">
            <div class="table-filters">
                <select id="status-filter">
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="approved">Approved</option>
                    <option value="rejected">Rejected</option>
                </select>
                <input type="text" id="search-posts" placeholder="Search posts...">
            </div>
            <div class="table-container">
                <table id="posts-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Caption</th>
                            <th>Media</th>
                            <th>Length</th>
                            <th>Author</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Approver</th>
                            <th>Approve Date</th>
                            <th>Engagement</th>
                            <th>Comments</th>
                            <th>Shares</th>
                            <th>Views</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="posts-table-body">
                        <!-- Posts will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Users Table Section -->
        <div id="users-tab" class="tab-content">
            <div class="table-filters">
                <select id="role-filter">
                    <option value="all">All Roles</option>
                    <option value="user">Users</option>
                    <option value="admin">Admins</option>
                </select>
                <input type="text" id="search-users" placeholder="Search users...">
            </div>
            <div class="table-container">
                <table id="users-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Join Date</th>
                            <th>Posts Count</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                        <!-- Users will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Rejection Modal -->
    <div id="rejection-modal" class="modal">
        <div class="modal-content">
            <h2>Reject Post</h2>
            <textarea id="rejection-reason" placeholder="Enter reason for rejection..."></textarea>
            <div class="modal-buttons">
                <button id="confirm-reject">Confirm</button>
                <button id="cancel-reject">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/js/admin-dashboard.js"></script>
</body>
</html>
